spring.application.name=ahoi-burger

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/miniapi

# Server
server.port=${PORT:8080}

# API Key Authentication (override with API_KEY environment variable in production)
api.key=${API_KEY:ahoi-secret-key-2024}

# Trust Railway's reverse proxy headers so HTTPS is detected correctly
server.forward-headers-strategy=framework
